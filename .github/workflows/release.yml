name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "$TARGET" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi
        env:
          TARGET: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target "$TARGET" -p rest-cli
        env:
          TARGET: ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ASSET_NAME="rest-cli-${TAG}-${TARGET}"
          mkdir -p "${ASSET_NAME}"
          cp "target/${TARGET}/release/rest-cli" "${ASSET_NAME}/"
          tar czf "${ASSET_NAME}.tar.gz" "${ASSET_NAME}"
          echo "ASSET=${ASSET_NAME}.tar.gz" >> "$GITHUB_ENV"
        env:
          TARGET: ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ASSET_NAME="rest-cli-${TAG}-${TARGET}"
          mkdir -p "${ASSET_NAME}"
          cp "target/${TARGET}/release/rest-cli.exe" "${ASSET_NAME}/"
          7z a "${ASSET_NAME}.zip" "${ASSET_NAME}"
          echo "ASSET=${ASSET_NAME}.zip" >> "$GITHUB_ENV"
        env:
          TARGET: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
